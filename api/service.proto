syntax = "proto3";

package polkaAutomator;

service PolkaAutomatorService {
    rpc StartNetwork (Empty) returns (Response);
    rpc StopNetwork (Empty) returns (Response);
    rpc ShowPaths (ShowPathsRequest) returns (ShowPathsResponse);
    rpc ConfigSinglePath (ConfigPathRequest) returns (Response);
    rpc ConfigShortestPaths (Empty) returns (Response);
}

message Empty {}

message Response {
    bool success = 1;
    string message = 2;
}

message ShowPathsRequest {
    string source = 1;
    string target = 2;
}

message ShowPathsResponse {
    bool success = 1;
    repeated string paths = 2;
    string message = 3;
}

message ConfigPathRequest {
    int32 index = 1;
    string source = 2;
    string target = 3;
}
